<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثبت نام دوره تربیت مدیر راهبردی</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    <style>
        body { font-family: 'Vazirmatn', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-4 lg:p-8 relative selection:bg-blue-200">
    
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
        <div class="absolute -top-40 -right-40 w-96 h-96 bg-blue-400 rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>
        <div class="absolute top-40 -left-20 w-72 h-72 bg-teal-400 rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>
        <div class="absolute -bottom-40 left-1/2 w-96 h-96 bg-indigo-400 rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>
    </div>

    <div class="relative bg-white/70 backdrop-blur-xl rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.06)] border border-white/60 w-full max-w-4xl p-8 lg:p-12">
        
        <div class="text-center mb-10">
            <h1 class="text-3xl lg:text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-700 to-teal-600 mb-3 drop-shadow-sm">دوره تربیت مدیر راهبردی</h1>
            <p class="text-slate-500 font-medium tracking-wide">اداره کل آموزش و پرورش استان همدان</p>
        </div>

        <form id="registrationForm" class="space-y-8">
            
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-x-8 gap-y-6">
                <div class="group">
                    <label class="block text-sm font-bold text-slate-700 mb-2 ml-1">نام و نام خانوادگی <span class="text-rose-500">*</span></label>
                    <input type="text" id="fullName" required class="w-full px-5 py-3 bg-white/60 border border-slate-200 rounded-xl focus:ring-2 focus:ring-teal-500 focus:border-teal-500 focus:bg-white shadow-sm transition-all duration-300 text-slate-800 hover:border-slate-300 outline-none">
                </div>

                <div class="group">
                    <label class="block text-sm font-bold text-slate-700 mb-2 ml-1">شماره ملی <span class="text-rose-500">*</span></label>
                    <input type="text" id="nationalId" required maxlength="10" placeholder="بدون خط تیره" class="w-full px-5 py-3 bg-white/60 border border-slate-200 rounded-xl focus:ring-2 focus:ring-teal-500 focus:border-teal-500 focus:bg-white shadow-sm transition-all duration-300 text-slate-800 hover:border-slate-300 outline-none tracking-widest text-left" dir="ltr">
                    <p id="nationalIdError" class="text-rose-500 text-xs mt-2 font-medium hidden">شماره ملی وارد شده نامعتبر است.</p>
                </div>

                <div class="group">
                    <label class="block text-sm font-bold text-slate-700 mb-2 ml-1">شماره پرسنلی <span class="text-rose-500">*</span></label>
                    <input type="text" id="personnelId" required class="w-full px-5 py-3 bg-white/60 border border-slate-200 rounded-xl focus:ring-2 focus:ring-teal-500 focus:border-teal-500 focus:bg-white shadow-sm transition-all duration-300 text-slate-800 hover:border-slate-300 outline-none tracking-widest text-left" dir="ltr">
                </div>

                <div class="group">
                    <label class="block text-sm font-bold text-slate-700 mb-2 ml-1">شماره همراه <span class="text-rose-500">*</span></label>
                    <input type="text" id="mobile" required maxlength="11" placeholder="09xxxxxxxxx" class="w-full px-5 py-3 bg-white/60 border border-slate-200 rounded-xl focus:ring-2 focus:ring-teal-500 focus:border-teal-500 focus:bg-white shadow-sm transition-all duration-300 text-slate-800 hover:border-slate-300 outline-none tracking-widest text-left" dir="ltr">
                </div>

                <div class="group">
                    <label class="block text-sm font-bold text-slate-700 mb-3 ml-1">جنسیت <span class="text-rose-500">*</span></label>
                    <div class="flex gap-6 bg-white/60 px-5 py-3 border border-slate-200 rounded-xl shadow-sm">
                        <label class="flex items-center gap-3 cursor-pointer group-hover:text-blue-600 transition-colors">
                            <input type="radio" name="gender" value="مرد" required class="w-5 h-5 text-teal-600 focus:ring-teal-500 border-slate-300">
                            <span class="font-medium text-slate-700">مرد</span>
                        </label>
                        <div class="w-px h-6 bg-slate-200"></div>
                        <label class="flex items-center gap-3 cursor-pointer group-hover:text-blue-600 transition-colors">
                            <input type="radio" name="gender" value="زن" required class="w-5 h-5 text-teal-600 focus:ring-teal-500 border-slate-300">
                            <span class="font-medium text-slate-700">زن</span>
                        </label>
                    </div>
                </div>

                <div class="group">
                    <label class="block text-sm font-bold text-slate-700 mb-2 ml-1">سنوات تجربی خدمت (سال) <span class="text-rose-500">*</span></label>
                    <input type="number" id="experience" required min="0" max="50" class="w-full px-5 py-3 bg-white/60 border border-slate-200 rounded-xl focus:ring-2 focus:ring-teal-500 focus:border-teal-500 focus:bg-white shadow-sm transition-all duration-300 text-slate-800 hover:border-slate-300 outline-none text-left" dir="ltr">
                </div>

                <div class="group">
                    <label class="block text-sm font-bold text-slate-700 mb-2 ml-1">شهر محل سکونت <span class="text-rose-500">*</span></label>
                    <select id="residenceCity" required class="w-full px-5 py-3 bg-white/60 border border-slate-200 rounded-xl focus:ring-2 focus:ring-teal-500 focus:border-teal-500 focus:bg-white shadow-sm transition-all duration-300 text-slate-800 hover:border-slate-300 outline-none appearance-none cursor-pointer">
                        <option value="">انتخاب کنید...</option>
                        <option value="ناحیه یک">همدان</option>
                        <option value="رزن">رزن</option>
                        <option value="فامنین">فامنین</option>
                        <option value="سردرود">سردرود</option>
                        <option value="درگزین">درگزین</option>
                        <option value="لالجین">لالجین</option>
                        <option value="کبودرآهنگ">کبودرآهنگ</option>
                        <option value="گل تپه">گل تپه</option>
                        <option value="شیرین سو">شیرین سو</option>
                        <option value="بهار">بهار</option>
                        <option value="اسدآباد">اسدآباد</option>
                        <option value="قهاوند">قهاوند</option>
                        <option value="جوکار">جوکار</option>
                        <option value="ملایر">ملایر</option>
                        <option value="سامن">سامن</option>
                        <option value="نهاوند">نهاوند</option>
                        <option value="خزل">خزل</option>
                        <option value="قلقل‌رود">قلقلرود</option>
                        <option value="تویسرکان">تویسرکان</option>
                    </select>
                </div>

                <div class="group">
                    <label class="block text-sm font-bold text-slate-700 mb-2 ml-1">محل خدمت <span class="text-rose-500">*</span></label>
                    <select id="workplace" required class="w-full px-5 py-3 bg-white/60 border border-slate-200 rounded-xl focus:ring-2 focus:ring-teal-500 focus:border-teal-500 focus:bg-white shadow-sm transition-all duration-300 text-slate-800 hover:border-slate-300 outline-none appearance-none cursor-pointer">
                        <option value="">انتخاب کنید...</option>
                        <option value="اداره کل">اداره کل</option>
                        <option value="ناحیه یک">ناحیه یک</option>
                        <option value="ناحیه دو">ناحیه دو</option>
                        <option value="رزن">رزن</option>
                        <option value="فامنین">فامنین</option>
                        <option value="سردرود">سردرود</option>
                        <option value="درگزین">درگزین</option>
                        <option value="لالجین">لالجین</option>
                        <option value="کبودرآهنگ">کبودرآهنگ</option>
                        <option value="گل تپه">گل تپه</option>
                        <option value="شیرین سو">شیرین سو</option>
                        <option value="بهار">بهار</option>
                        <option value="اسدآباد">اسدآباد</option>
                        <option value="قهاوند">قهاوند</option>
                        <option value="جوکار">جوکار</option>
                        <option value="ملایر">ملایر</option>
                        <option value="سامن">سامن</option>
                        <option value="نهاوند">نهاوند</option>
                        <option value="خزل">خزل</option>
                        <option value="قلقل‌رود">قلقلرود</option>
                        <option value="تویسرکان">تویسرکان</option>
                    </select>
                </div>

                <div class="col-span-1 lg:col-span-2 group">
                    <label class="block text-sm font-bold text-slate-700 mb-2 ml-1">سمت <span class="text-rose-500">*</span></label>
                    <select id="position" required class="w-full px-5 py-3 bg-white/60 border border-slate-200 rounded-xl focus:ring-2 focus:ring-teal-500 focus:border-teal-500 focus:bg-white shadow-sm transition-all duration-300 text-slate-800 hover:border-slate-300 outline-none appearance-none cursor-pointer">
                        <option value="">انتخاب کنید...</option>
                        <option value="آموزگار">آموزگار</option>
                        <option value="دبیر">دبیر</option>
                        <option value="مدیر مدرسه">مدیر مدرسه</option>
                        <option value="معاون">معاون</option>
                        <option value="اداری">اداری</option>
                        <option value="هنرآموز">هنرآموز</option>
                        <option value="دانشجومعلم">دانشجومعلم</option>
                    </select>
                </div>
            </div>

            <div class="mt-10 pt-8 border-t border-slate-200/60">
                <button type="submit" id="submitBtn" class="w-full bg-gradient-to-r from-blue-600 to-teal-500 hover:from-blue-700 hover:to-teal-600 text-white font-bold py-4 px-6 rounded-xl shadow-lg hover:shadow-xl transform hover:-translate-y-0.5 transition-all duration-300 focus:ring-4 focus:ring-teal-300 outline-none text-lg">
                    ثبت اطلاعات
                </button>
            </div>
        </form>
    </div>

    <script>
        function isValidIranianNationalCode(input) {
            if (!/^\d{10}$/.test(input)) return false;
            const check = parseInt(input[9]);
            let sum = 0;
            for (let i = 0; i < 9; i++) {
                sum += parseInt(input[i]) * (10 - i);
            }
            sum %= 11;
            return (sum < 2 && check === sum) || (sum >= 2 && check === 11 - sum);
        }

        document.getElementById('registrationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const nationalIdInput = document.getElementById('nationalId');
            const nationalIdError = document.getElementById('nationalIdError');
            
            if (!isValidIranianNationalCode(nationalIdInput.value)) {
                nationalIdInput.classList.add('border-red-500');
                nationalIdError.classList.remove('hidden');
                return;
            } else {
                nationalIdInput.classList.remove('border-red-500');
                nationalIdError.classList.add('hidden');
            }

            const formData = {
                fullName: document.getElementById('fullName').value,
                nationalId: nationalIdInput.value,
                personnelId: document.getElementById('personnelId').value,
                mobile: document.getElementById('mobile').value,
                gender: document.querySelector('input[name="gender"]:checked').value,
                experience: document.getElementById('experience').value,
                residenceCity: document.getElementById('residenceCity').value,
                workplace: document.getElementById('workplace').value,
                position: document.getElementById('position').value
            };

            const submitBtn = document.getElementById('submitBtn');
            const originalBtnText = submitBtn.innerText;
            submitBtn.disabled = true;
            submitBtn.innerText = 'در حال ارسال...';

            fetch('https://script.google.com/macros/s/AKfycbzacgZfLgOkFdMr42mAykx9w_TmLjMzYBbHNZx0kHfKdEF1SDyERjeWxHNetMt6Vxb4/exec', {
                method: 'POST',
                mode: 'no-cors',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(formData)
            }).then(() => {
                alert('ثبت نام با موفقیت انجام شد.');
                document.getElementById('registrationForm').reset();
            }).catch(error => {
                alert('خطا در ارسال اطلاعات.');
            }).finally(() => {
                submitBtn.disabled = false;
                submitBtn.innerText = originalBtnText;
            });
        });
    </script>
</body>
</html>
